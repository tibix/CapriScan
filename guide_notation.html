<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide de notation CapriScan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Playfair+Display:wght@700&display=swap');
  :root{ --bg:#0a1a0e; --surf:#111f14; --surf2:#182a1c; --brd:#1e3322; --txt:#edf2ee; --muted:#6b8f72; --acc:#3dba6a; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; background:var(--bg); color:var(--txt); font-family:'Inter',sans-serif; }
  .app{ display:flex; flex-direction:column; height:100vh; }
  header{ background:var(--surf); border-bottom:1px solid var(--brd); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .logo{ font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; }
  .logo span{ color:var(--acc); }
  .tagline{ font-size:0.65rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
  nav{ background:var(--surf); border-bottom:2px solid var(--brd); display:flex; flex-shrink:0; }
  nav button{ flex:1; padding:10px 4px; border:none; background:transparent; color:var(--muted); font-size:0.72rem; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; white-space:nowrap; }
  nav button.active{ color:var(--acc); border-bottom-color:var(--acc); background:rgba(61,186,106,.07); }
  .content{ flex:1; overflow-y:auto; padding:16px; }
  .intro{ background:var(--surf); border:1px solid var(--brd); border-radius:12px; padding:12px 16px; margin-bottom:14px; display:flex; gap:12px; }
  .intro-icon{ font-size:1.6rem; flex-shrink:0; }
  .intro h2{ font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:3px; }
  .intro p{ color:var(--muted); font-size:0.78rem; line-height:1.5; }
  .scale{ display:flex; gap:5px; margin-bottom:14px; overflow-x:auto; }
  .sc{ flex:1; min-width:80px; background:var(--surf); border:1px solid var(--brd); border-radius:8px; padding:6px 8px; display:flex; align-items:center; gap:6px; }
  .sc-dot{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:0.75rem; color:#0a1a0e; flex-shrink:0; }
  .sc-txt strong{ display:block; font-size:0.68rem; font-weight:700; }
  .sc-txt span{ color:var(--muted); font-size:0.6rem; }
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .card{ background:var(--surf); border:1.5px solid var(--brd); border-radius:14px; overflow:hidden; }
  .card-head{ display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--brd); }
  .badge{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:0.95rem; color:#0a1a0e; flex-shrink:0; }
  .card-label{ font-weight:700; font-size:0.88rem; }
  .card-sub{ font-size:0.67rem; color:var(--muted); }
  .illus{ padding:12px; background:var(--surf2); display:flex; justify-content:center; min-height:180px; align-items:center; }
  .desc{ padding:11px 14px; font-size:0.77rem; color:var(--muted); line-height:1.55; }
  .desc strong{ color:var(--txt); }
  .tags{ padding:0 14px 11px; display:flex; flex-wrap:wrap; gap:5px; }
  .tag{ font-size:0.65rem; padding:2px 7px; border-radius:8px; border:1px solid; font-weight:600; }
  .about{ background:var(--surf); border-top:2px solid var(--brd); padding:20px 24px; margin-top:24px; border-radius:14px; }
  .about h3{ font-family:'Playfair Display',serif; font-size:1rem; color:var(--acc); margin-bottom:8px; }
  .about p{ font-size:0.78rem; color:var(--muted); line-height:1.6; }
  @media(max-width:900px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  @media(max-width:600px){ .grid{ grid-template-columns:1fr; } nav button{ font-size:0.62rem; padding:10px 2px; } }
</style>
</head>

// ── Rendu ──────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('nav').innerHTML=CRITERES.map((c,i)=>
    `<button onclick="show('${c.id}',this)"${i===0?' class="active"':''}>${c.icon} ${c.label}</button>`).join('');

  document.getElementById('content').innerHTML=CRITERES.map((c,i)=>`
<div id="panel-${c.id}" style="display:${i===0?'block':'none'}">
  <div class="intro"><div class="intro-icon">${c.icon}</div><div>
    <h2>${c.title}</h2><p>${c.desc}</p></div></div>
  <div class="grid">${c.notes.map((n,j)=>`
    <div class="card">
      <div class="card-head"><div class="badge" style="background:${C[j]}">${j+1}</div>
        <div><div class="card-label">${n.label}</div><div class="card-sub">${n.sub}</div></div></div>
      <div class="illus">
        <img src="images/${c.id}_${j+1}.png" alt="${n.label}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
             style="width:100%;max-height:200px;object-fit:cover;border-radius:4px;">
        <div style="display:none;width:100%;height:160px;border:2px dashed var(--brd);border-radius:8px;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--muted);">
          <span style="font-size:1.8rem;">📷</span>
          <span style="font-size:0.72rem;">${c.id}_${j+1}.png</span>
        </div>
      </div>
      <div class="desc">${n.desc}</div>
      <div class="tags">${n.tags.map(t=>`<span class="tag" style="color:${C[j]};border-color:${C[j]}">${t}</span>`).join('')}</div>
    </div>`).join('')}
  </div>
  <div class="about">
    <h3>À propos de CapriScan</h3>
    <p>CapriScan est une application de gestion de troupeau caprin conçue pour les éleveurs caprins. Elle permet de noter chaque animal selon 6 critères de sélection, de gérer l'inventaire du troupeau, de suivre les événements sanitaires et de synchroniser toutes les données entre appareils via le cloud. Ce guide de notation est un référentiel visuel destiné à accompagner les éleveurs dans leur travail de sélection au quotidien.</p>
  </div>
</div>`).join('');
}

function show(id,btn){
  CRITERES.forEach(c=>document.getElementById('panel-'+c.id).style.display='none');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).style.display='block';
  btn.classList.add('active');
  document.getElementById('content').scrollTop=0;
}

render();
</script>
